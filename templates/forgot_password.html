{% extends "base.html" %}
{% block title %}Forgot Password — RoomBandhu{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🔐</span>
      <h2>Reset <b style="color:var(--accent)">Password</b></h2>
      <p>Enter your email — we'll send a 6-digit OTP</p>
    </div>
    <form method="POST" action="/forgot-password" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control"
               placeholder="you@email.com" required autocomplete="email" inputmode="email">
      </div>
      <button type="submit" class="btn btn-accent btn-lg btn-full" style="margin-top:4px">
        Send OTP →
      </button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--muted)">
      Remembered it?
      <a href="/login" style="color:var(--accent);font-weight:600">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
