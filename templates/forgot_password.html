{% extends "base.html" %}
{% block title %}Forgot Password — Room Bandhu{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-icon">🏠</span>
      <h2>Room<b style="color:var(--accent)">Bandhu</b></h2>
      <p>Reset your password</p>
    </div>

    <!-- ── FORGOT PASSWORD FORM ── -->
    <form method="POST" action="/forgot-password">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control"
               placeholder="you@email.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-accent btn-lg btn-full" style="margin-top:8px">
        Send Reset Link →
      </button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--muted)">
      Remember your password?
      <a href="/login" style="color:var(--accent);font-weight:600">Login here</a>
    </p>

  </div>
</div>
{% endblock %}
