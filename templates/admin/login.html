<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Admin Login — RoomBandhu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#0d0d0d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:18px;padding:36px 30px;width:100%;max-width:400px}
    .logo{text-align:center;margin-bottom:26px}
    .logo h2{font-family:'Syne',sans-serif;font-size:22px;color:#fff;margin-top:6px}
    .badge{display:inline-block;background:#e05c2c22;color:#e05c2c;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin:4px 0 14px;letter-spacing:.5px;text-transform:uppercase}
    label{display:block;font-size:13px;color:#aaa;margin-bottom:5px;font-weight:600}
    input{width:100%;background:#111;border:1.5px solid #2a2a2a;border-radius:9px;padding:11px 13px;color:#fff;font-size:15px;outline:none;font-family:inherit;transition:border-color .2s;-webkit-appearance:none}
    input:focus{border-color:#e05c2c}
    .form-group{margin-bottom:15px}
    .btn{width:100%;background:#e05c2c;color:#fff;border:none;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .2s;font-family:inherit}
    .btn:hover{background:#c94f24}
    .flash{border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;font-weight:500}
    .flash.error{background:#c94f2422;color:#f87171;border:1px solid #c94f2444}
    .flash.success{background:#22c55e22;color:#4ade80;border:1px solid #22c55e44}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div style="font-size:34px">🏠</div>
      <h2>RoomBandhu</h2>
      <div class="badge">Admin Portal</div>
      <p style="font-size:13px;color:#666">Restricted — authorised personnel only</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" name="email" placeholder="admin@roombandhu.com" required autocomplete="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Login to Admin →</button>
    </form>
  </div>
</body>
</html>
