{% extends "base.html" %}
{% block title %}New Password — RoomBandhu{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🔒</span>
      <h2>New <b style="color:var(--accent)">Password</b></h2>
      <p>Choose a strong new password</p>
    </div>
    <form method="POST" action="/reset-password" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="Minimum 6 characters" required minlength="6"
               autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control"
               placeholder="Repeat password" required
               autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-accent btn-lg btn-full" style="margin-top:4px">
        Reset Password →
      </button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--muted)">
      <a href="/login" style="color:var(--accent);font-weight:600">← Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
