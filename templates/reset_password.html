{% extends "base.html" %}
{% block title %}Reset Password — Room Bandhu{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-icon">🏠</span>
      <h2>Room<b style="color:var(--accent)">Bandhu</b></h2>
      <p>Enter your new password</p>
    </div>

    <!-- ── RESET PASSWORD FORM ── -->
    <form method="POST" action="{{ request.url }}">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control"
               placeholder="Repeat password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-accent btn-lg btn-full" style="margin-top:8px">
        Reset Password →
      </button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--muted)">
      Remember your password?
      <a href="/login" style="color:var(--accent);font-weight:600">Login here</a>
    </p>

  </div>
</div>
{% endblock %}
